<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastBoard Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5YRJSQll0S37G1sVbbdosrVBJdQJGYA",
  authDomain: "jows-overlay.firebaseapp.com",
  projectId: "jows-overlay"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const adminEmail = "ko.ki.bb6220@gmail.com";
</script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#2b2b2b,#3a3a3a);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  padding:20px 40px;
  font-size:26px;
}

.headerLeft,.headerRight{
  display:flex;
  align-items:center;
  gap:12px;
}

.brandLogo{
  width:42px;
  height:42px;
  object-fit:contain;
}

.brandTitle{
  font-weight:bold;
}

.brandPage{
  font-size:16px;
  opacity:.8;
}

.headerBtn{
  background:#e5e5e5;
  border:none;
  border-radius:25px;
  padding:8px 20px;
  font-size:14px;
  cursor:pointer;
  color:#111;
  text-decoration:none;
}

.container{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:30px;
  padding:0 30px 30px;
}

.card{
  background:#f5f5f5;
  color:#111;
  border-radius:30px;
  padding:30px;
  box-shadow:0 10px 30px rgba(255,0,0,0.2);
}

.label{
  font-weight:bold;
  margin-top:18px;
}

.input,.select{
  width:100%;
  box-sizing:border-box;
  padding:14px 20px;
  border-radius:18px;
  border:none;
  background:#ddd;
  margin-top:8px;
  font-size:16px;
}

.checkRow{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:18px;
  font-weight:bold;
}

.btn{
  width:100%;
  margin-top:24px;
  padding:14px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  background:#9fd4d9;
}

.btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.message{
  min-height:22px;
  margin-top:14px;
  font-weight:bold;
}

.keyList{
  display:grid;
  gap:12px;
}

.keyItem{
  background:#e8e8e8;
  border-radius:18px;
  padding:16px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:12px;
  align-items:center;
}

.keyCode{
  font-weight:bold;
  word-break:break-all;
}

.keyMeta{
  margin-top:6px;
  color:#555;
  font-size:14px;
  line-height:1.5;
}

.copyBtn{
  border:none;
  border-radius:18px;
  background:#d9df9c;
  padding:10px 18px;
  cursor:pointer;
  font-weight:bold;
}

.empty{
  color:#555;
  line-height:1.7;
}

@media(max-width:900px){
  .container{grid-template-columns:1fr;}
}

@media(max-width:700px){
  .header{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    padding:14px 16px;
    font-size:22px;
  }

  .headerRight{
    flex-wrap:wrap;
  }

  .container{
    padding:0 12px 24px;
    gap:18px;
  }

  .card{
    border-radius:22px;
    padding:20px;
  }

  .keyItem{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="header">
  <div class="headerLeft">
    <img class="brandLogo" src="./CastBoard_alpha.png" alt="CastBoard">
    <div>
      <span class="brandTitle">CastBoard</span>
      <span class="brandPage">管理者</span>
    </div>
  </div>
  <div class="headerRight">
    <a class="headerBtn" href="settings.html">設定へ</a>
    <a class="headerBtn" href="control.html">管理画面へ</a>
    <button id="logoutBtn" class="headerBtn">ログアウト</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>ライセンス発行</h2>

    <div class="label">プラン</div>
    <select id="planInput" class="select">
      <option value="one_day">1Day</option>
      <option value="monthly">1Month</option>
      <option value="admin">管理者用</option>
    </select>

    <div class="label">日数</div>
    <input id="daysInput" class="input" type="number" min="1" value="1">

    <div class="label">発行数</div>
    <input id="countInput" class="input" type="number" min="1" max="50" value="1">

    <label class="checkRow">
      <input id="supportInput" type="checkbox" checked>
      フルサポート付き
    </label>

    <div class="label">メモ</div>
    <input id="noteInput" class="input" placeholder="例：6月大会 / 依頼者名">

    <button id="createBtn" class="btn">ライセンスキーを発行</button>
    <div id="message" class="message"></div>
  </div>

  <div class="card">
    <h2>発行したキー</h2>
    <div id="createdKeys" class="keyList">
      <div class="empty">ここに今回発行したキーが表示されます。</div>
    </div>

    <h2>最近のキー</h2>
    <div id="recentKeys" class="keyList">
      <div class="empty">読み込み中...</div>
    </div>
  </div>
</div>

<script>
let currentUser = null;

const planInput = document.getElementById("planInput");
const daysInput = document.getElementById("daysInput");
const countInput = document.getElementById("countInput");
const supportInput = document.getElementById("supportInput");
const noteInput = document.getElementById("noteInput");
const createBtn = document.getElementById("createBtn");
const message = document.getElementById("message");
const createdKeys = document.getElementById("createdKeys");
const recentKeys = document.getElementById("recentKeys");
const logoutBtn = document.getElementById("logoutBtn");

function setMessage(text, isError = false){
  message.innerText = text;
  message.style.color = isError ? "#c42626" : "#197a4d";
}

function randomPart(length = 4){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let text = "";
  for(let i = 0; i < length; i++){
    text += chars[Math.floor(Math.random() * chars.length)];
  }
  return text;
}

function makeKey(plan){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  if(plan === "monthly") return `CB-${y}${m}-M-${randomPart()}-${randomPart()}`;
  if(plan === "admin") return `CB-ADMIN-${randomPart()}-${randomPart()}`;
  return `CB-${y}${m}-D-${randomPart()}-${randomPart()}`;
}

function planLabel(plan){
  const labels = {
    one_day: "1Day",
    monthly: "1Month",
    admin: "管理者用"
  };
  return labels[plan] || plan;
}

function dateText(value){
  if(!value || typeof value.toDate !== "function") return "";
  return value.toDate().toLocaleString("ja-JP", {
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function renderKey(parent, key, data){
  const item = document.createElement("div");
  item.className = "keyItem";

  const body = document.createElement("div");
  const code = document.createElement("div");
  code.className = "keyCode";
  code.innerText = key;

  const meta = document.createElement("div");
  meta.className = "keyMeta";
  const usedText = data.usedBy ? `使用済み: ${data.usedBy}` : "未使用";
  const supportText = data.supportIncluded ? "サポートあり" : "サポートなし";
  const createdText = dateText(data.createdAt);
  meta.innerText = `${planLabel(data.plan)} / ${data.days || "-"}日 / ${supportText} / ${usedText}${createdText ? " / " + createdText : ""}`;

  const copyBtn = document.createElement("button");
  copyBtn.className = "copyBtn";
  copyBtn.innerText = "コピー";
  copyBtn.onclick = () => navigator.clipboard.writeText(key);

  body.appendChild(code);
  body.appendChild(meta);
  item.appendChild(body);
  item.appendChild(copyBtn);
  parent.appendChild(item);
}

function renderCreated(items){
  createdKeys.innerHTML = "";
  items.forEach(item => renderKey(createdKeys, item.key, item.data));
}

async function loadRecentKeys(){
  recentKeys.innerHTML = "<div class=\"empty\">読み込み中...</div>";
  try{
    const snap = await db.collection("licenseKeys").orderBy("createdAt", "desc").limit(30).get();
    recentKeys.innerHTML = "";
    if(snap.empty){
      recentKeys.innerHTML = "<div class=\"empty\">まだキーが発行されていません。</div>";
      return;
    }
    snap.docs.forEach(doc => renderKey(recentKeys, doc.id, doc.data()));
  }catch(error){
    recentKeys.innerHTML = "<div class=\"empty\">最近のキーを読み込めませんでした。</div>";
  }
}

async function createLicenses(){
  const plan = planInput.value;
  const count = Math.max(1, Math.min(50, Number(countInput.value || 1)));
  const days = plan === "monthly" ? 30 : plan === "admin" ? 36500 : Math.max(1, Number(daysInput.value || 1));
  const supportIncluded = supportInput.checked;
  const note = noteInput.value.trim();

  createBtn.disabled = true;
  setMessage("発行中...");

  try{
    const batch = db.batch();
    const items = [];

    for(let i = 0; i < count; i++){
      let key = makeKey(plan);
      let ref = db.collection("licenseKeys").doc(key);
      let exists = await ref.get();

      while(exists.exists){
        key = makeKey(plan);
        ref = db.collection("licenseKeys").doc(key);
        exists = await ref.get();
      }

      const data = {
        active: true,
        plan,
        days,
        supportIncluded,
        usedBy: "",
        note,
        createdBy: currentUser.uid,
        createdByEmail: currentUser.email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      batch.set(ref, data);
      items.push({
        key,
        data: {
          ...data,
          createdAt: null
        }
      });
    }

    await batch.commit();
    renderCreated(items);
    setMessage(`${items.length}件のライセンスキーを発行しました`);
    await loadRecentKeys();
  }catch(error){
    setMessage("ライセンスキーの発行に失敗しました。Firestore Rulesを確認してください。", true);
  }finally{
    createBtn.disabled = false;
  }
}

planInput.onchange = () => {
  if(planInput.value === "monthly"){
    daysInput.value = 30;
    daysInput.disabled = true;
  }else if(planInput.value === "admin"){
    daysInput.value = 36500;
    daysInput.disabled = true;
  }else{
    daysInput.value = 1;
    daysInput.disabled = false;
  }
};

createBtn.onclick = createLicenses;
logoutBtn.onclick = async () => {
  await auth.signOut();
  localStorage.removeItem("jows_uid");
  location.href = "login.html";
};

auth.onAuthStateChanged(async user => {
  if(!user){
    location.href = "login.html";
    return;
  }

  await user.reload();
  if(user.email !== adminEmail){
    document.body.innerHTML = "<div style=\"padding:40px;color:white;font-family:sans-serif;\"><h1>アクセス権限がありません</h1><p>このページは管理者専用です。</p><p><a style=\"color:white;\" href=\"control.html\">管理画面へ戻る</a></p></div>";
    return;
  }

  currentUser = user;
  await loadRecentKeys();
});
</script>
</body>
</html>
