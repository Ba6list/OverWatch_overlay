<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JOWS Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5YRJSQll0S37G1sVbbdosrVBJdQJGYA",
  authDomain: "jows-overlay.firebaseapp.com",
  projectId: "jows-overlay"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#2b2b2b,#3a3a3a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#111;
}

.wrapper{
  width:min(1100px, calc(100vw - 40px));
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
}

.card{
  background:#eee;
  border-radius:30px;
  padding:40px;
  box-shadow:0 10px 30px rgba(255,0,0,0.2);
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:24px;
}

.tab{
  flex:1;
  border:none;
  border-radius:18px;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
  background:#d2d2d2;
}

.tab.active{
  background:#d9df9c;
}

.inputRow{
  display:flex;
  margin-bottom:16px;
}

.label{
  width:120px;
  background:#333;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:15px 0 0 15px;
  font-size:14px;
}

.input{
  flex:1;
  min-width:0;
  border:none;
  padding:15px;
  background:#ccc;
  border-radius:0 15px 15px 0;
  font-size:16px;
}

.remember{
  margin-top:12px;
  font-size:14px;
}

.loginBtn{
  margin-top:20px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:25px;
  background:#ddd;
  font-size:18px;
  cursor:pointer;
  font-weight:bold;
}

.loginBtn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.updateBox{
  background:#777;
  padding:30px;
  border-radius:30px;
}

.updateTitle{
  background:#eee;
  padding:10px 20px;
  border-radius:20px;
  display:inline-block;
  margin-bottom:20px;
  font-weight:bold;
}

.updateContent{
  background:#eee;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(255,0,0,0.2);
  line-height:1.8;
}

.message{
  min-height:22px;
  margin-top:14px;
  color:#c42626;
  font-weight:bold;
}

.footer{
  position:fixed;
  bottom:30px;
  color:white;
  font-size:22px;
}

@media(max-width:900px){
  .wrapper{grid-template-columns:1fr; padding-bottom:80px;}
  .footer{font-size:16px;}
}
</style>
</head>

<body>
<div class="wrapper">

  <div>
    <div class="card">
      <div class="tabs">
        <button id="loginTab" class="tab active" type="button">ログイン</button>
        <button id="registerTab" class="tab" type="button">新規作成</button>
      </div>

      <div id="accountNameRow" class="inputRow" style="display:none;">
        <div class="label">大会名</div>
        <input id="accountName" class="input" placeholder="例：JOWS CUP">
      </div>

      <div class="inputRow">
        <div class="label">メール</div>
        <input id="email" class="input" type="email" autocomplete="email">
      </div>

      <div class="inputRow">
        <div class="label">Pass</div>
        <input id="pass" type="password" class="input" autocomplete="current-password">
      </div>

      <div class="remember">
        <input type="checkbox" id="remember">
        この端末を記憶する。
      </div>

      <div id="message" class="message"></div>
    </div>

    <button id="submitBtn" class="loginBtn" type="button">ログイン</button>
  </div>

  <div class="updateBox">
    <div class="updateTitle">Ver 2.0 Update</div>
    <div class="updateContent">
      ・Firebase Authenticationで大会アカウント管理<br>
      ・アカウントごとのチーム名、ロゴ管理<br>
      ・設定ページでチームロゴをアップロード<br>
      ・配信用URLをアカウントごとに分離<br>
      ・BANキャラ画像は従来通り ./icon/キャラ名.png を使用<br>
    </div>
  </div>

</div>

<div class="footer">JOWS 配信UI管理画面</div>

<script>
let mode = "login";

const loginTab = document.getElementById("loginTab");
const registerTab = document.getElementById("registerTab");
const accountNameRow = document.getElementById("accountNameRow");
const accountNameInput = document.getElementById("accountName");
const emailInput = document.getElementById("email");
const passInput = document.getElementById("pass");
const rememberInput = document.getElementById("remember");
const submitBtn = document.getElementById("submitBtn");
const message = document.getElementById("message");

function setMode(nextMode){
  mode = nextMode;
  message.innerText = "";
  loginTab.classList.toggle("active", mode === "login");
  registerTab.classList.toggle("active", mode === "register");
  accountNameRow.style.display = mode === "register" ? "flex" : "none";
  submitBtn.innerText = mode === "login" ? "ログイン" : "アカウント作成";
}

function showError(error){
  const map = {
    "auth/invalid-email": "メールアドレスの形式が正しくありません",
    "auth/user-not-found": "アカウントが見つかりません",
    "auth/wrong-password": "パスワードが違います",
    "auth/invalid-credential": "メールまたはパスワードが違います",
    "auth/email-already-in-use": "このメールアドレスは既に使用されています",
    "auth/weak-password": "パスワードは6文字以上にしてください",
    "auth/operation-not-allowed": "Firebase Authenticationでメール/パスワードログインを有効化してください",
    "auth/unauthorized-domain": "このURLがFirebaseの承認済みドメインに登録されていません",
    "permission-denied": "Firestoreのルール設定で書き込みが許可されていません",
    "unavailable": "Firebaseに接続できませんでした。通信環境を確認してください"
  };

  message.innerText = map[error.code] || "処理に失敗しました";
}

async function submit(){
  const email = emailInput.value.trim();
  const pass = passInput.value;
  const remember = rememberInput.checked;

  if(!email || !pass){
    message.innerText = "メールとパスワードを入力してください";
    return;
  }

  submitBtn.disabled = true;
  message.innerText = "";

  try{
    try{
      await auth.setPersistence(
        remember
          ? firebase.auth.Auth.Persistence.LOCAL
          : firebase.auth.Auth.Persistence.NONE
      );
    }catch(persistenceError){
      // ローカル確認環境などで保持設定が使えない場合も、ログイン処理は続行します。
    }

    let result;

    if(mode === "register"){
      const accountName = accountNameInput.value.trim();
      if(!accountName){
        message.innerText = "大会名を入力してください";
        submitBtn.disabled = false;
        return;
      }

      result = await auth.createUserWithEmailAndPassword(email, pass);
      await db.collection("users").doc(result.user.uid).set({
        accountName,
        email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge:true });

      await db.collection("users").doc(result.user.uid).collection("match").doc("current").set({
        teamA: "",
        teamB: "",
        teamALogoUrl: "",
        teamBLogoUrl: "",
        banA: "",
        banB: "",
        scoreA: 0,
        scoreB: 0,
        mode: "control",
        side: "attack_right",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge:true });
    }else{
      result = await auth.signInWithEmailAndPassword(email, pass);
    }

    localStorage.setItem("jows_uid", result.user.uid);
    location.href = "control.html";
  }catch(error){
    showError(error);
  }finally{
    submitBtn.disabled = false;
  }
}

loginTab.onclick = () => setMode("login");
registerTab.onclick = () => setMode("register");
submitBtn.onclick = submit;
passInput.addEventListener("keydown", e => {
  if(e.key === "Enter") submit();
});

auth.onAuthStateChanged(user => {
  if(user){
    localStorage.setItem("jows_uid", user.uid);
    location.href = "control.html";
  }
});
</script>
</body>
</html>
