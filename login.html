<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastBoard Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5YRJSQll0S37G1sVbbdosrVBJdQJGYA",
  authDomain: "jows-overlay.firebaseapp.com",
  projectId: "jows-overlay"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#2b2b2b,#3a3a3a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#111;
}

.wrapper{
  width:min(1100px, calc(100vw - 40px));
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
  color:white;
}

.brandLogo{
  width:72px;
  height:72px;
  object-fit:contain;
}

.brandTitle{
  font-size:30px;
  font-weight:bold;
  line-height:1.1;
}

.brandSub{
  font-size:14px;
  opacity:.8;
  margin-top:4px;
}

.card{
  background:#eee;
  border-radius:30px;
  padding:40px;
  box-shadow:0 10px 30px rgba(255,0,0,0.2);
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:24px;
}

.tab{
  flex:1;
  border:none;
  border-radius:18px;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
  background:#d2d2d2;
}

.tab.active{
  background:#d9df9c;
}

.inputRow{
  display:flex;
  margin-bottom:16px;
}

.label{
  width:120px;
  background:#333;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:15px 0 0 15px;
  font-size:14px;
}

.input{
  flex:1;
  min-width:0;
  border:none;
  padding:15px;
  background:#ccc;
  border-radius:0 15px 15px 0;
  font-size:16px;
}

.remember{
  margin-top:12px;
  font-size:14px;
}

.loginBtn{
  margin-top:20px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:25px;
  background:#ddd;
  font-size:18px;
  cursor:pointer;
  font-weight:bold;
}

.loginBtn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.updateBox{
  background:#777;
  padding:30px;
  border-radius:30px;
}

.updateTitle{
  background:#eee;
  padding:10px 20px;
  border-radius:20px;
  display:inline-block;
  margin-bottom:20px;
  font-weight:bold;
}

.updateContent{
  background:#eee;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(255,0,0,0.2);
  line-height:1.8;
}

.message{
  min-height:22px;
  margin-top:14px;
  color:#c42626;
  font-weight:bold;
}

.footer{display:none;}

@media(max-width:900px){
  .wrapper{grid-template-columns:1fr; padding-bottom:80px;}
  .footer{font-size:16px;}
}

@media(max-width:700px){
  body{
    align-items:flex-start;
    min-height:100vh;
    padding:16px 0 90px;
    box-sizing:border-box;
  }

  .wrapper{
    width:calc(100vw - 24px);
    gap:24px;
  }

  .brand{
    justify-content:center;
    text-align:left;
  }

  .brandLogo{
    width:60px;
    height:60px;
  }

  .brandTitle{
    font-size:24px;
  }

  .card,
  .updateBox{
    border-radius:22px;
    padding:22px;
  }

  .tabs{
    gap:8px;
  }

  .tab{
    padding:12px 8px;
  }

  .inputRow{
    display:grid;
  }

  .label{
    width:auto;
    min-height:42px;
    border-radius:15px 15px 0 0;
  }

  .input{
    min-width:0;
    border-radius:0 0 15px 15px;
  }

  .loginBtn{
    border-radius:22px;
  }

  .footer{
    bottom:20px;
    font-size:15px;
  }
}
</style>
</head>

<body>
<div class="wrapper">

  <div>
    <div class="brand">
      <img class="brandLogo" src="./CastBoard_alpha.png" alt="CastBoard">
      <div>
        <div class="brandTitle">CastBoard</div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button id="loginTab" class="tab active" type="button">ログイン</button>
        <button id="registerTab" class="tab" type="button">新規作成</button>
      </div>

      <div id="accountNameRow" class="inputRow" style="display:none;">
        <div class="label">大会名</div>
        <input id="accountName" class="input" placeholder="例：OW CUP">
      </div>

      <div class="inputRow">
        <div id="loginLabel" class="label">大会名</div>
        <input id="email" class="input" autocomplete="username">
      </div>

      <div class="inputRow">
        <div class="label">Pass</div>
        <input id="pass" type="password" class="input" autocomplete="current-password">
      </div>

      <div class="remember">
        <input type="checkbox" id="remember">
        この端末を記憶する。
      </div>

      <div id="message" class="message"></div>
    </div>

    <button id="submitBtn" class="loginBtn" type="button">ログイン</button>
  </div>

  <div class="updateBox">
    <div class="updateTitle">Ver 1.1 Update</div>
    <div class="updateContent">
      ・URLを変更<br>
      ・試合切り替えタブの実装
      ・ライセンス制度を追加<br>
      ・UIバリエーションの追加<br>
      ・パソコン以外の媒体での使用感向上<br>
      ・攻守交代を実装<br>
      ・UI上の微調整<br>
      ・ログイン機能を実装<br>
      ・大会アカウントごとのチーム名、ロゴ管理を追加<br>
      ・設定ページでチームロゴのアップロードに対応<br>
      ・配信用URLをアカウントごとに分離<br>
    </div>
  </div>

</div>

<script>
let mode = "login";

const loginTab = document.getElementById("loginTab");
const registerTab = document.getElementById("registerTab");
const accountNameRow = document.getElementById("accountNameRow");
const accountNameInput = document.getElementById("accountName");
const emailInput = document.getElementById("email");
const passInput = document.getElementById("pass");
const rememberInput = document.getElementById("remember");
const submitBtn = document.getElementById("submitBtn");
const message = document.getElementById("message");
const loginLabel = document.getElementById("loginLabel");

function normalizeAccountName(name){
  return name.trim().toLowerCase().replace(/\s+/g, "_");
}

function getRedirectTarget(){
  const next = new URLSearchParams(location.search).get("next");
  const allowedPages = ["control.html", "settings.html", "admin.html"];
  return allowedPages.includes(next) ? next : "control.html";
}

function setMode(nextMode){
  mode = nextMode;
  message.innerText = "";
  message.style.color = "#c42626";
  loginTab.classList.toggle("active", mode === "login");
  registerTab.classList.toggle("active", mode === "register");
  accountNameRow.style.display = mode === "register" ? "flex" : "none";
  loginLabel.innerText = mode === "login" ? "大会名" : "メール";
  emailInput.type = mode === "login" ? "text" : "email";
  emailInput.placeholder = mode === "login" ? "登録した大会名" : "";
  submitBtn.innerText = mode === "login" ? "ログイン" : "アカウント作成";
}

function showError(error){
  message.style.color = "#c42626";
  const map = {
    "auth/invalid-email": "メールアドレスの形式が正しくありません",
    "auth/user-not-found": "アカウントが見つかりません",
    "auth/wrong-password": "パスワードが違います",
    "auth/invalid-credential": "メールまたはパスワードが違います",
    "auth/email-already-in-use": "このメールアドレスは既に使用されています",
    "auth/weak-password": "パスワードは6文字以上にしてください",
    "auth/operation-not-allowed": "Firebase Authenticationでメール/パスワードログインを有効化してください",
    "auth/unauthorized-domain": "このURLがFirebaseの承認済みドメインに登録されていません",
    "permission-denied": "Firestoreのルール設定で書き込みが許可されていません",
    "unavailable": "Firebaseに接続できませんでした。通信環境を確認してください"
  };

  message.innerText = map[error.code] || "処理に失敗しました";
}

async function submit(){
  const loginValue = emailInput.value.trim();
  const pass = passInput.value;
  const remember = rememberInput.checked;

  if(!loginValue || !pass){
    message.innerText = mode === "login"
      ? "大会名とパスワードを入力してください"
      : "メールとパスワードを入力してください";
    return;
  }

  submitBtn.disabled = true;
  message.innerText = "";

  try{
    try{
      await auth.setPersistence(
        remember
          ? firebase.auth.Auth.Persistence.LOCAL
          : firebase.auth.Auth.Persistence.SESSION
      );
    }catch(persistenceError){
      try{
        await auth.setPersistence(firebase.auth.Auth.Persistence.NONE);
      }catch(ignorePersistenceError){
        // ローカル確認環境などで保持設定が使えない場合も、ログイン処理は続行します。
      }
    }

    let result;

    if(mode === "register"){
      const accountName = accountNameInput.value.trim();
      const accountKey = normalizeAccountName(accountName);
      const email = loginValue;
      if(!accountName){
        message.innerText = "大会名を入力してください";
        submitBtn.disabled = false;
        return;
      }

      const accountNameDoc = await db.collection("accountNames").doc(accountKey).get();
      if(accountNameDoc.exists){
        message.innerText = "この大会名は既に使用されています";
        submitBtn.disabled = false;
        return;
      }

      result = await auth.createUserWithEmailAndPassword(email, pass);
      await result.user.sendEmailVerification();

      await db.collection("users").doc(result.user.uid).set({
        accountName,
        accountKey,
        email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge:true });

      await db.collection("accountNames").doc(accountKey).set({
        accountName,
        email,
        uid: result.user.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      await db.collection("users").doc(result.user.uid).collection("match").doc("current").set({
        teamA: "",
        teamB: "",
        teamALogoUrl: "",
        teamBLogoUrl: "",
        banA: "",
        banB: "",
        standingA: "",
        standingB: "",
        scoreA: 0,
        scoreB: 0,
        mode: "control",
        side: "attack_right",
        banEnabled: true,
        standingEnabled: false,
        logoEnabled: true,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge:true });

      await auth.signOut();
      message.style.color = "#197a4d";
      message.innerText = "認証メールを送信しました。認証後ログインが可能になります。";
      setMode("login");
      return;
    }else{
      const accountKey = normalizeAccountName(loginValue);
      const accountNameDoc = await db.collection("accountNames").doc(accountKey).get();
      if(!accountNameDoc.exists){
        message.innerText = "大会名またはパスワードが違います";
        submitBtn.disabled = false;
        return;
      }

      const email = accountNameDoc.data().email;
      result = await auth.signInWithEmailAndPassword(email, pass);
      await result.user.reload();

      if(!result.user.emailVerified){
        await auth.signOut();
        message.innerText = "メール認証が完了していません。確認メールのリンクを開いてください";
        submitBtn.disabled = false;
        return;
      }
    }

    localStorage.setItem("jows_uid", result.user.uid);
    location.href = getRedirectTarget();
  }catch(error){
    showError(error);
  }finally{
    submitBtn.disabled = false;
  }
}

loginTab.onclick = () => setMode("login");
registerTab.onclick = () => setMode("register");
submitBtn.onclick = submit;
passInput.addEventListener("keydown", e => {
  if(e.key === "Enter") submit();
});

auth.onAuthStateChanged(user => {
  if(user && user.emailVerified){
    localStorage.setItem("jows_uid", user.uid);
    location.href = getRedirectTarget();
  }
});
</script>
</body>
</html>
