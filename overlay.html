<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JOWS Overlay</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5YRJSQll0S37G1sVbbdosrVBJdQJGYA",
  authDomain: "jows-overlay.firebaseapp.com",
  projectId: "jows-overlay"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body{
  margin:0;
  background:transparent;
}

.wrap{
  width:1920px;
  position:relative;
}

#uiBase{
  width:1920px;
  display:block;
}

.left{
  position:absolute;
  top:18px;
  left:140px;
}

.left .name{
  position:absolute;
  left:150px;
  transform:translateX(-50%);
  top:8px;
  font-size:22px;
  color:white;
  font-weight:bold;
  white-space:nowrap;
}

.left .logo{
  position:absolute;
  left:315px;
  top:-3px;
  height:55px;
  max-width:80px;
  object-fit:contain;
}

.left .score{
  position:absolute;
  left:388px;
  top:1px;
  font-size:32px;
  color:white;
  font-weight:bold;
}

.right{
  position:absolute;
  top:18px;
  right:140px;
}

.right .name{
  position:absolute;
  right:150px;
  transform:translateX(50%);
  top:8px;
  font-size:22px;
  color:white;
  font-weight:bold;
  white-space:nowrap;
  text-align:right;
}

.right .logo{
  position:absolute;
  right:315px;
  top:-3px;
  height:55px;
  max-width:80px;
  object-fit:contain;
}

.right .score{
  position:absolute;
  right:388px;
  top:1px;
  font-size:32px;
  color:white;
  font-weight:bold;
}

.ban-left img{
  position:absolute;
  top:14.5px;
  left:43px;
  width:44px;
  height:44px;
}

.ban-right img{
  position:absolute;
  top:14.5px;
  right:43px;
  width:44px;
  height:44px;
}

.standing{
  position:absolute;
  top:35px;
  color:white;
  font-size:11px;
  font-weight:bold;
  line-height:1;
  white-space:nowrap;
}

#standingA{
  left:110px;
  transform:translateX(-50%);
}

#standingB{
  right:110px;
  transform:translateX(50%);
}
</style>
</head>

<body>
<div class="wrap">
  <img id="uiBase" src="./UI/JOWS_template_basic.png">

  <div class="left">
    <img class="logo" id="logoA">
    <div class="name" id="nameA"></div>
    <div class="score" id="scoreA"></div>
  </div>

  <div class="right">
    <img class="logo" id="logoB">
    <div class="name" id="nameB"></div>
    <div class="score" id="scoreB"></div>
  </div>

  <div class="ban-left"><img id="banA"></div>
  <div class="ban-right"><img id="banB"></div>
  <div id="standingA" class="standing"></div>
  <div id="standingB" class="standing"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const uid = params.get("uid") || localStorage.getItem("jows_uid") || "";

const uiBase = document.getElementById("uiBase");
const logoA = document.getElementById("logoA");
const logoB = document.getElementById("logoB");
const nameA = document.getElementById("nameA");
const nameB = document.getElementById("nameB");
const scoreA = document.getElementById("scoreA");
const scoreB = document.getElementById("scoreB");
const banA = document.getElementById("banA");
const banB = document.getElementById("banB");
const standingA = document.getElementById("standingA");
const standingB = document.getElementById("standingB");
const left = document.querySelector(".left");
const right = document.querySelector(".right");
const leftName = document.querySelector(".left .name");
const rightName = document.querySelector(".right .name");

function setBaseUi(d){
  const hasAttack = d.mode === "escort" || d.mode === "hybrid";
  const hasBan = d.banEnabled !== false;
  const hasStanding = hasBan && d.standingEnabled === true;

  if(!hasAttack){
    if(hasStanding){
      uiBase.src = "./UI/JOWS_template_basic_ban_standing.png";
    }else if(hasBan){
      uiBase.src = "./UI/JOWS_template_basic_ban.png";
    }else{
      uiBase.src = "./UI/JOWS_template_basic.png";
    }
    return;
  }

  const sideName = d.side === "attack_left" ? "L" : "R";
  const suffix = hasStanding ? "_ban_standing" : hasBan ? "_ban" : "";
  uiBase.src = `./UI/JOWS_template_${sideName}_attack${suffix}.png`;
}

function setPositions(d){
  if(d.mode === "escort" || d.mode === "hybrid"){
    left.style.left = "87px";
    right.style.right = "87px";
    leftName.style.left = "190px";
    rightName.style.right = "190px";
  }else{
    left.style.left = "140px";
    right.style.right = "140px";
    leftName.style.left = "150px";
    rightName.style.right = "150px";
  }
}

function applyData(d){
  setBaseUi(d);
  setPositions(d);

  nameA.innerText = d.teamA || "";
  nameB.innerText = d.teamB || "";
  scoreA.innerText = d.scoreA ?? 0;
  scoreB.innerText = d.scoreB ?? 0;

  const hasBan = d.banEnabled !== false;
  const hasStanding = hasBan && d.standingEnabled === true;
  const hasLogo = d.logoEnabled !== false;

  logoA.style.display = hasLogo ? "block" : "none";
  logoB.style.display = hasLogo ? "block" : "none";
  banA.style.display = hasBan ? "block" : "none";
  banB.style.display = hasBan ? "block" : "none";
  standingA.style.display = hasStanding ? "block" : "none";
  standingB.style.display = hasStanding ? "block" : "none";

  logoA.src = hasLogo && d.teamALogoUrl ? d.teamALogoUrl : "";
  logoB.src = hasLogo && d.teamBLogoUrl ? d.teamBLogoUrl : "";
  banA.src = hasBan && d.banA ? "./icon/" + d.banA + ".png" : "";
  banB.src = hasBan && d.banB ? "./icon/" + d.banB + ".png" : "";
  standingA.innerText = hasStanding ? d.standingA || "" : "";
  standingB.innerText = hasStanding ? d.standingB || "" : "";
}

if(uid){
  db.collection("users").doc(uid).collection("match").doc("current")
    .onSnapshot(doc => {
      const d = doc.data();
      if(!d) return;
      applyData(d);
    });
}
</script>
</body>
</html>
